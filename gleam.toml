name = "gleam_mcp_todo"
version = "0.1.0"
target = "erlang"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
gleam_erlang = "~> 1.0"
gleam_http = "~> 4.0"
wisp = "~> 2.2"
mist = "~> 5.0"
gleam_json = ">= 3.0.0 and < 4.0.0"
gleam_crypto = ">= 1.5.1 and < 2.0.0"
gleam_otp = "~> 1.2"
sqlight = "~> 1.0"
parrot = "~> 2.2"
envoy = ">= 1.1.0 and < 2.0.0"
simplifile = "~> 2.0"
dot_env = ">= 1.2.0 and < 2.0.0"
logging = ">= 1.3.0 and < 2.0.0"
lustre = "~> 5.0"
glimit = { path = "lib/glimit" }

[dev-dependencies]
unitest = ">= 1.5.0 and < 2.0.0"
glinter = ">= 2.7.0 and < 3.0.0"

[tools.glinter]
stats = true
include = ["src/", "test/"]
exclude = ["src/gleam_mcp_todo/sql.gleam"]

[tools.glinter.rules]
unused_exports = "off"

[tools.glinter.ignore]
# Startup code: intentional crash-on-missing-config
"src/gleam_mcp_todo.gleam" = ["unwrap_used", "assert_ok_pattern"]
# DB setup: panics are correct for SQLite pragma enforcement
"src/gleam_mcp_todo/db.gleam" = ["avoid_panic", "assert_ok_pattern"]
# Tests: relaxed rules
"test/**/*.gleam" = ["avoid_panic", "assert_ok_pattern", "short_variable_name", "missing_type_annotation", "label_possible", "missing_labels", "unwrap_used", "unqualified_import", "discarded_result"]
